<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>午膳殿 · UI Kit</title>
<style>
/* ═══════════════════════════════════════════════════════════════
   午膳殿 DESIGN SYSTEM — Colors & Type
   A Taiwanese Mandarin tarot-themed lunch-decider app.
   Aesthetic: temple-meets-tarot. Warm parchment light mode;
   dark "back-of-the-tarot-card" for revealed states.
   ═══════════════════════════════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@400;700&family=Ma+Shan+Zheng&display=swap');

:root {
  /* ── Parchment / Light (the "temple" surface) ────────────── */
  --bg:         #f5f0e8;   /* main parchment */
  --bg-alt:     #efe9dd;   /* slightly darker parchment */
  --card-bg:    #faf7f0;   /* raised card on parchment */

  /* ── Ink / Foreground (calligraphy blacks & browns) ──────── */
  --ink:          #2c2416; /* primary text — dark roasted brown */
  --ink-light:    #6b5d4d; /* secondary text */
  --ink-lighter:  #a89880; /* tertiary, borders, dim labels */

  /* ── Accent ──────────────────────────────────────────────── */
  --accent:     #c23a2e;   /* vermillion — seal-stamp red */
  --gold:       #b89030;   /* ceremonial gold — light bg */
  --gold-card:  #c4a44e;   /* gold on dark tarot cards */

  /* ── Dark Tarot (revealed / card interior) ───────────────── */
  --tarot-bg:        #1a1612;
  --tarot-bg-mid:    #221c16;
  --tarot-text:      #e8dcc8;
  --tarot-text-mut:  #a89880;
  --tarot-text-dim:  #6b5d4d;
  --tarot-bg-grad:   linear-gradient(180deg, #1a1612 0%, #221c16 50%, #1a1612 100%);

  /* ── Tier Accents — each tier has its own soul ───────────── */
  --tier-shumin:  #c4a44e;   /* 庶民 — classic warm gold */
  --tier-xiaozi:  #d4b44e;   /* 小資 — brighter gold */
  --tier-fangzong:#e8943a;   /* 放縱 — hot amber sin-orange */
  --tier-kuxing:  #7a8088;   /* 苦行 — cold monastic slate */
  --tier-chuanshuo:#ffd700;  /* 傳說 — pure divine gold */

  /* ── Devil Mode — when the demon takes over ──────────────── */
  --devil-bg:        #1a1214;
  --devil-bg-grad:   linear-gradient(180deg, #1a1214 0%, #2a1a1e 50%, #1a1214 100%);
  --devil-red:       #8b3a3a;
  --devil-red-hot:   #c25050;
  --devil-text:      #e8c4c4;
  --devil-text-mut:  #8a6060;

  /* ── Type Families ────────────────────────────────────────
     Ma Shan Zheng — brushed calligraphy, used for headings,
       food names, "殿"-type ceremonial labels. High letter-spacing.
     LXGW WenKai TC — traditional Chinese reading face, used for
       everything else. Warm, humanist, temple-appropriate.
     System sans — only as fallback.
     ──────────────────────────────────────────────────────── */
  --font-brush: 'Ma Shan Zheng', cursive;
  --font-body:  'LXGW WenKai TC', 'Noto Serif TC', serif;

  /* ── Spacing / Radii / Elevation ──────────────────────────── */
  --radius-sm:  6px;
  --radius-md:  8px;
  --radius-lg:  12px;
  --radius-xl:  14px;

  --shadow-card:         0 2px 8px rgba(0,0,0,0.06);
  --shadow-card-hover:   0 12px 40px rgba(0,0,0,0.18);
  --shadow-tarot:        0 16px 56px rgba(0,0,0,0.4), 0 2px 6px rgba(0,0,0,0.2);
  --shadow-legend:       0 16px 56px rgba(0,0,0,0.6), 0 0 50px rgba(255,215,0,0.25);
  --shadow-devil:        0 16px 56px rgba(139,58,58,0.4), 0 0 60px rgba(139,58,58,0.1);

  /* ── Section fills (on dark tarot cards) ──────────────────── */
  --sec-gold-bg:     rgba(196, 164, 78, 0.06);
  --sec-gold-border: rgba(196, 164, 78, 0.10);
  --sec-gold-dim:    rgba(196, 164, 78, 0.15);
}

/* ═══════════════════════════════════════════════════════════════
   Semantic Text Styles — use these directly, don't re-invent.
   ═══════════════════════════════════════════════════════════════ */

.t-display {          /* 午膳殿 — biggest ceremonial wordmark */
  font-family: var(--font-brush);
  font-size: clamp(36px, 8vw, 56px);
  color: var(--ink);
  letter-spacing: 6px;
  line-height: 1.2;
}

.t-h1 {               /* section headers, 食曆, 午膳殿暫停營業 */
  font-family: var(--font-brush);
  font-size: 32px;
  color: var(--ink);
  letter-spacing: 6px;
}

.t-h2 {               /* sub-section (食曆統計, 功德成就) */
  font-family: var(--font-brush);
  font-size: 20px;
  color: var(--ink);
  letter-spacing: 3px;
}

.t-food-name {        /* 滷肉飯, 火鍋 — the drawn tarot food */
  font-family: var(--font-brush);
  font-size: clamp(28px, 8vw, 38px);
  color: var(--gold-card);
  letter-spacing: 8px;
  text-shadow: 0 2px 12px rgba(196,164,78,0.35);
}

.t-food-name--legend {
  color: var(--tier-chuanshuo);
  font-size: clamp(30px, 9vw, 42px);
  text-shadow: 0 2px 16px rgba(255,215,0,0.5);
}

.t-subtitle {         /* home screen tagline */
  font-family: var(--font-body);
  font-size: clamp(14px, 3vw, 18px);
  color: var(--ink-light);
  letter-spacing: 3px;
}

.t-body {             /* paragraph / reading text on tarot */
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.6;
  color: var(--ink);
}

.t-caption {          /* dates, 週X, small meta */
  font-family: var(--font-body);
  font-size: 11px;
  color: var(--ink-lighter);
  letter-spacing: 1px;
}

.t-label {            /* 宜 / 忌 / 幸運物 pill labels */
  font-family: var(--font-body);
  font-size: 12px;
  color: var(--gold-card);
  letter-spacing: 2px;
}

.t-quote {            /* "大師曰："italic wisdom */
  font-family: var(--font-body);
  font-size: 15px;
  color: var(--tarot-text);
  line-height: 1.8;
  font-style: italic;
}

.t-meta-dim {         /* "— 點擊卡牌 —" flip hints */
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--ink-lighter);
  letter-spacing: 1px;
}

</style>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); font-family: 'LXGW WenKai TC', serif; color: var(--ink); }
  @keyframes pulse { 0%, 100% { opacity: 0.6 } 50% { opacity: 1 } }
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  @keyframes pulse-hint { 0%, 100% { opacity: 0.5 } 50% { opacity: 1 } }
  .stage { background: var(--bg); border-radius: 18px; overflow: hidden; box-shadow: 0 6px 32px rgba(0,0,0,0.08); border: 1px solid #e8dfcf; }
  .frame-wrap { width: 360px; height: 720px; position: relative; overflow: hidden; }
  .frame-wrap > div { width: 100%; height: 100%; overflow: auto; }
  .kit-grid { max-width: 1440px; margin: 0 auto; padding: 32px 24px 64px; }
  .kit-title { font-family: 'Ma Shan Zheng', cursive; font-size: 40px; color: var(--ink); letter-spacing: 8px; margin: 0 0 4px; text-align: center; }
  .kit-sub { font-size: 13px; color: var(--ink-light); text-align: center; letter-spacing: 3px; margin-bottom: 32px; }
  .row { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 24px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .cell-label { font-family: 'Ma Shan Zheng', cursive; font-size: 18px; letter-spacing: 4px; color: var(--ink); }
  .cell-desc { font-size: 11px; color: var(--ink-lighter); letter-spacing: 2px; margin-top: -6px; }
  .tag { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 10px; letter-spacing: 1px; background: rgba(196,164,78,0.14); color: #8b7520; border: 1px solid rgba(196,164,78,0.3); }
</style>
</head>

  <div class="kit-sub">UI KIT — WǓ SHÀN DIÀN · HALL OF LUNCH</div>

  <div id="app-root" class="row"></div>
</div>

      <path d="M2 18 L2 2 L18 2" stroke={c} strokeWidth="0.8" opacity="0.5"/>
    </svg>
  );
  const legendVine = (c) => (
    <svg viewBox="0 0 52 52" fill="none">
      <path d="M4 48 Q4 20 14 12 Q24 4 48 4" stroke={c} strokeWidth="1.5" opacity="0.8"/>
      <path d="M10 30 Q6 24 12 20 Q18 16 14 26 Z" fill={c} opacity="0.4"/>
      <path d="M24 14 Q20 8 26 8 Q32 8 26 12 Z" fill={c} opacity="0.45"/>
      <circle cx="8" cy="36" r="1.5" fill={c} opacity="0.6"/>
    </svg>
  );
  const pick = tier === "放縱" ? flameVine : tier === "苦行" ? asceticLine
    : tier === "傳說" ? legendVine : basicVine;
  return (
    <>
      <div style={{ ...style, top: 8, left: 8 }}>{pick(color)}</div>
      <div style={{ ...style, top: 8, right: 8, transform: "scaleX(-1)" }}>{pick(color)}</div>
      <div style={{ ...style, bottom: 8, left: 8, transform: "scaleY(-1)" }}>{pick(color)}</div>
      <div style={{ ...style, bottom: 8, right: 8, transform: "scale(-1)" }}>{pick(color)}</div>
    </>
  );
}

function TierGem({ tier, color }) {
  const gems = {
    "庶民": <circle cx="8" cy="8" r="3" fill={color}/>,
    "小資": <polygon points="8,2 14,8 8,14 2,8" fill={color}/>,
    "放縱": <polygon points="8,1 15,8 8,15 1,8" fill={color}/>,
    "苦行": <circle cx="8" cy="8" r="2.2" fill={color}/>,
    "傳說": <polygon points="8,1 10,6 15,6 11,10 13,15 8,12 3,15 5,10 1,6 6,6" fill={color}/>,
  };
  return (
    <svg viewBox="0 0 16 16" style={{ width: 14, height: 14, marginBottom: 2 }}>
      {gems[tier]}

}

function OrnamentDivider({ color, symbol = "✦" }) {
  return (
    <div style={{
      display: "flex", alignItems: "center", gap: 8,

      <span style={{ flex: 1, height: 1, background: `linear-gradient(90deg, transparent, ${color}, transparent)` }}/>

function FoodNameGlow({ isLegend, children }) {
  if (!isLegend) return children;
  return (
    <div style={{ position: "relative" }}>

        position: "absolute", inset: -10, pointerEvents: "none",

}

function StarField() {
  return (
    <div style={{
      position: "absolute", inset: 0, pointerEvents: "none",
      backgroundImage: `radial-gradient(circle at 20% 30%, rgba(196,164,78,0.1) 1px, transparent 1px),

      backgroundSize: "80px 80px, 120px 120px, 100px 100px",
      opacity: 0.5,

}

Object.assign(window, { CardCorners, TierGem, OrnamentDivider, FoodNameGlow, StarField });

  return (
    <div style={{ minHeight: "100%", padding: "24px 16px 40px" }}>
      <div style={{ display: "flex", alignItems: "center", marginBottom: 24 }}>
        <button onClick={onBack} style={{
          background: "none", border: "none", cursor: "pointer",
          fontFamily: "'LXGW WenKai TC', serif", fontSize: 14,
          color: "var(--ink-light)", letterSpacing: 1,
        }}>← 返回</button>
        <h2 style={{
          fontFamily: "'Ma Shan Zheng', cursive", fontSize: 32,
          color: "var(--ink)", margin: "0 auto",
          letterSpacing: 6, paddingRight: 40,
        }}>食曆</h2>
      </div>

      {history.length > 0 && (
        <div style={{
          background: "var(--card-bg)", border: "1.5px solid var(--ink-lighter)",
          borderRadius: 12, padding: 20, marginBottom: 24,
          maxWidth: 420, margin: "0 auto 24px",
        }}>
          <div style={{
            fontFamily: "'Ma Shan Zheng', cursive", fontSize: 20,
            color: "var(--ink)", marginBottom: 16, letterSpacing: 3, textAlign: "center",
          }}>食曆統計</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            <StatLine label="累計求指引" value={`${history.length} 次`} comment={history.length > 10 ? "殿內大師都認得你了" : ""}/>
            <StatLine label="不服重抽" value={`${totalRerolls} 次`} comment={totalRerolls > 5 ? "大師表示：你很難伺候" : ""}/>
            <StatLine label="嚐過品項" value={`${uniqueFoods} 種`}/>
            {topFood && <StatLine label="最常出現" value={`${topFood[0]} × ${topFood[1]}`} comment={topFood[1] >= 2 ? "有緣份" : ""}/>}
          </div>
        </div>
      )}

      <div style={{
        background: "var(--card-bg)", border: "1.5px solid var(--ink-lighter)",
        borderRadius: 12, padding: 20, marginBottom: 24,
        maxWidth: 420, margin: "0 auto 24px",
      }}>
        <div style={{
          fontFamily: "'Ma Shan Zheng', cursive", fontSize: 20,
          color: "var(--ink)", marginBottom: 16, letterSpacing: 3, textAlign: "center",
        }}>功德成就</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {ACHS.map(a => {
            const unlocked = achievements.includes(a.id);
            return (
              <div key={a.id} style={{
                display: "flex", alignItems: "center", gap: 12,
                opacity: unlocked ? 1 : 0.5,
                padding: "8px 12px", borderRadius: 8,
                background: unlocked ? "var(--bg-alt)" : "transparent",
              }}>
                <span style={{ fontSize: 24 }}>{unlocked ? a.icon : "🔒"}</span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontFamily: "'LXGW WenKai TC', serif", fontSize: 14, fontWeight: 700, color: "var(--ink)" }}>{a.name}</div>
                  <div style={{ fontFamily: "'LXGW WenKai TC', serif", fontSize: 12, color: "var(--ink-light)" }}>{a.desc}</div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div style={{ maxWidth: 420, margin: "0 auto" }}>
        <div style={{
          fontFamily: "'Ma Shan Zheng', cursive", fontSize: 20,
          color: "var(--ink)", marginBottom: 16, letterSpacing: 3, textAlign: "center",
        }}>歷次紀錄</div>
        {history.length === 0 ? (
          <p style={{
            fontFamily: "'LXGW WenKai TC', serif", fontSize: 14,
            color: "var(--ink-lighter)", textAlign: "center", marginTop: 40,
          }}>尚無紀錄，快去求一次指引吧。</p>
        ) : (
          [...history].reverse().map((r, i) => (
            <div key={i} style={{
              background: "var(--card-bg)", border: "1px solid var(--ink-lighter)",
              borderRadius: 10, padding: 16, marginBottom: 12, position: "relative",
            }}>
              <div style={{
                fontFamily: "'LXGW WenKai TC', serif", fontSize: 11,
                color: "var(--ink-lighter)", letterSpacing: 1, marginBottom: 6,
              }}>{r.date} 週{r.weekday}{r.time ? ` ${r.time}` : ""}</div>
              <div style={{
                fontFamily: "'Ma Shan Zheng', cursive", fontSize: 24,
                color: "var(--ink)", letterSpacing: 3,
              }}>{r.food}</div>
              <div style={{ fontFamily: "'LXGW WenKai TC', serif", fontSize: 12, color: "var(--ink-light)", marginTop: 4 }}>
                {r.fortune} ・ {r.master}
              </div>
              <div style={{
                fontFamily: "'LXGW WenKai TC', serif", fontSize: 12,
                color: "var(--ink-lighter)", marginTop: 4, fontStyle: "italic",
              }}>「{r.quote}」</div>
              {(r.rerolls || 0) > 0 && (
                <div style={{
                  fontFamily: "'LXGW WenKai TC', serif", fontSize: 11,
                  color: "#c23a2e", marginTop: 6,
                }}>重抽 {r.rerolls} 次才認命</div>
              )}
            </div>
          ))
        )}
      </div>
    </div>
  );
}

window.HistoryPage = HistoryPage;

</script>

            fontFamily: "'Ma Shan Zheng', cursive",
            fontSize: "clamp(34px,9vw,44px)", color: "#e8c4c4",
            letterSpacing: 6, marginBottom: 10,
            textShadow: "0 2px 20px rgba(194,80,80,0.4)",
          }}>{reading.food}</div>
          <div style={{
            fontFamily: "'LXGW WenKai TC', serif", fontSize: 13,
            color: "#c25050", letterSpacing: 3,
          }}>{reading.masterIcon || "👹"} {reading.master}曰：</div>
          <div style={{
            fontFamily: "'LXGW WenKai TC', serif", fontSize: 15,
            color: "#e8c4c4", lineHeight: 1.8, fontStyle: "italic",
            marginTop: 8, padding: "0 10px",
          }}>「{reading.quote}」</div>
        </div>
        <button onClick={onAccept} style={{
          background: "#8b3a3a", color: "#e8c4c4",
          fontFamily: "'LXGW WenKai TC', serif",
          fontSize: 14, fontWeight: 700,
          padding: "12px 38px", letterSpacing: 4,
          border: "none", borderRadius: 8, cursor: "pointer",
          boxShadow: "0 4px 16px rgba(139,58,58,0.4)",
        }}>遵旨</button>
      </div>
      <p style={{
        fontFamily: "'LXGW WenKai TC', serif", fontSize: 12,
        color: "#8a6060", marginTop: 20, letterSpacing: 3,
        textAlign: "center",
      }}>此為魔王之命，不得違抗。<br/>接受後 10 分鐘內不得再求。</p>
    </div>

}

window.DevilCard = DevilCard;

</script>

function Cell({ label, desc, tag, children }) {
  return (
    <div className="cell">
      <div className="cell-label">{label}</div>
      {desc && <div className="cell-desc">{desc}</div>}
      {tag && <span className="tag">{tag}</span>}
      <div className="stage frame-wrap">{children}</div>
    </div>
  );
}

function Demo() {
  const [page, setPage] = useState("home");
  const [reading, setReading] = useState(READINGS.shomin);
  const [rerolls, setRerolls] = useState(0);

  const goHome = () => { setPage("home"); setRerolls(0); };
  const goResult = (r) => { setReading(r); setPage("result"); setRerolls(0); };
  const reroll = () => {
    const pool = [READINGS.shomin, READINGS.indulgent, READINGS.ascetic, READINGS.legend];
    setReading(pool[Math.floor(Math.random() * pool.length)]);
    setRerolls(r => {
      const n = r + 1;
      if (n >= 5) setPage("devil");
      return n;
    });
  };

  return (
    <>
      <Cell label="首頁 / 翻牌" desc="CardBack" tag="home">
        <CardBack onFlip={() => goResult(READINGS.shomin)} subtitle="上班如渡劫，午餐求指引"/>
      </Cell>
      <Cell label="庶民之味" desc="ResultCard · 庶民" tag="result">
        <ResultCard reading={READINGS.shomin} rerollCount={rerolls} onReroll={reroll} onAccept={goHome}/>
      </Cell>
      <Cell label="今日放縱" desc="ResultCard · 放縱" tag="result">
        <ResultCard reading={READINGS.indulgent} rerollCount={0} onReroll={() => {}} onAccept={() => {}}/>
      </Cell>
      <Cell label="苦行修練" desc="ResultCard · 苦行" tag="result">
        <ResultCard reading={READINGS.ascetic} rerollCount={0} onReroll={() => {}} onAccept={() => {}}/>
      </Cell>
      <Cell label="百年難遇" desc="ResultCard · 傳說" tag="legend">
        <ResultCard reading={READINGS.legend} rerollCount={0} onReroll={() => {}} onAccept={() => {}}/>
      </Cell>
      <Cell label="魔王降臨" desc="DevilCard · 重抽 ≥ 10" tag="devil">
        <DevilCard reading={READINGS.indulgent} onAccept={() => {}}/>
      </Cell>
      <Cell label="食曆 · 統計" desc="HistoryPage" tag="history">
        <HistoryPage history={SAMPLE_HISTORY} achievements={["first","friday"]} onBack={() => {}}/>
      </Cell>
      <Cell label="互動流程" desc={`翻牌 → 查看 → 重抽 (現: ${rerolls}) → 認命 / 魔王`} tag="live">
        <div>
          {page === "home" && <CardBack onFlip={() => goResult(READINGS.shomin)} subtitle="誠心翻牌" />}
          {page === "result" && <ResultCard reading={reading} rerollCount={rerolls} onReroll={reroll} onAccept={goHome}/>}
          {page === "devil" && <DevilCard reading={reading} onAccept={goHome}/>}
        </div>
      </Cell>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("app-root")).render(<Demo />);
</script>
</body>
