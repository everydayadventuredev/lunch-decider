<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1612"/>
      <stop offset="50%" stop-color="#221c16"/>
      <stop offset="100%" stop-color="#1a1612"/>
    </linearGradient>
  </defs>
  <!-- Tarot card body (3:4 ratio, rounded corners) -->
  <rect x="4" y="2" width="40" height="44" rx="5" ry="5" fill="url(#cardBg)" stroke="#c4a44e" stroke-width="2"/>
  <!-- Inner double-border -->
  <rect x="7" y="5" width="34" height="38" rx="3" ry="3" fill="none" stroke="#c4a44e" stroke-width="0.8" opacity="0.35"/>
  <!-- Corner dots — ornament signature -->
  <circle cx="8.5" cy="6.5" r="0.9" fill="#c4a44e" opacity="0.6"/>
  <circle cx="39.5" cy="6.5" r="0.9" fill="#c4a44e" opacity="0.6"/>
  <circle cx="8.5" cy="41.5" r="0.9" fill="#c4a44e" opacity="0.6"/>
  <circle cx="39.5" cy="41.5" r="0.9" fill="#c4a44e" opacity="0.6"/>
  <!-- 膳 character, gold on dark — wordmark as logo -->
  <text x="24" y="33"
    font-family="'Ma Shan Zheng','Noto Serif TC',serif"
    font-size="26"
    fill="#c4a44e"
    text-anchor="middle"
    font-weight="700">膳</text>
</svg>
