<!doctype html>
<html lang="zh-TW"><head>
<meta charset="utf-8"><title>Seal Stamps</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;background:#f5f0e8;padding:30px 20px;font-family:'Ma Shan Zheng',cursive;display:flex;gap:28px;flex-wrap:wrap;align-items:center;justify-content:center}
.seal{display:inline-block;border-width:3px;border-style:solid;border-radius:6px;padding:4px 10px;font-weight:900;letter-spacing:2px;opacity:0.85;line-height:1.3;white-space:nowrap}
.s1{border-color:#c23a2e;color:#c23a2e;font-size:22px;transform:rotate(-12deg)}
.s2{border-color:#c4a44e;color:#c4a44e;font-size:22px;transform:rotate(-8deg)}
.s3{border-color:#c0a868;color:#c0a868;font-size:20px;transform:rotate(-6deg)}
.s4{border-color:#b89030;color:#b89030;font-size:16px;transform:rotate(-10deg)}
</style></head>
<body>
<span class="seal s1">御膳</span>
<span class="seal s2">週五無禁忌</span>
<span class="seal s3">週三症候群</span>
<span class="seal s4">傳說</span>
</body></html>
