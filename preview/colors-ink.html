<!doctype html>
<html lang="zh-TW"><head>
<meta charset="utf-8"><title>Colors — Ink</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;background:#f5f0e8;padding:20px;font-family:var(--font-body)}
.wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.sw{border-radius:8px;overflow:hidden;background:#faf7f0;border:1px solid #e8dfcf}
.chip{height:68px}
.meta{padding:8px 10px;font-size:11px;display:flex;justify-content:space-between;align-items:center}
.name{font-family:var(--font-brush);letter-spacing:2px;font-size:13px;color:#2c2416}
.hex{color:#a89880;font-variant-numeric:tabular-nums}
.demo{font-family:var(--font-body);font-size:14px;padding:4px 10px 10px;letter-spacing:1px}
</style></head>
<body>
<div class="wrap">
  <div class="sw"><div class="chip" style="background:#2c2416"></div><div class="meta"><span class="name">ink 墨</span><span class="hex">#2c2416</span></div><div class="demo" style="color:#2c2416">午膳殿</div></div>
  <div class="sw"><div class="chip" style="background:#6b5d4d"></div><div class="meta"><span class="name">ink-light</span><span class="hex">#6b5d4d</span></div><div class="demo" style="color:#6b5d4d">大師曰</div></div>
  <div class="sw"><div class="chip" style="background:#a89880"></div><div class="meta"><span class="name">ink-lighter</span><span class="hex">#a89880</span></div><div class="demo" style="color:#a89880">乙巳年 · 週三</div></div>
</div></body></html>
