<!doctype html>
<html lang="zh-TW"><head>
<meta charset="utf-8"><title>Food Tiers</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;background:#f5f0e8;padding:16px;font-family:'LXGW WenKai TC',serif;color:#2c2416;display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.t{border-radius:8px;padding:10px 8px;text-align:center;border:1px solid}
.t .lab{font-family:'Ma Shan Zheng',cursive;font-size:14px;letter-spacing:3px;margin-bottom:4px}
.t .ex{font-size:10px;line-height:1.5;color:#6b5d4d}
.t-1{background:#faf7f0;border-color:#c4a44e;color:#b89030}
.t-2{background:#faf7f0;border-color:#d4b44e;color:#b89030}
.t-3{background:#fdf4e8;border-color:#e8943a;color:#e8943a}
.t-4{background:#eef0f2;border-color:#7a8088;color:#7a8088}
.t-5{background:#fffae0;border-color:#ffd700;color:#b89030}
</style></head>
<body>
<div class="t t-1"><div class="lab">庶民之味</div><div class="ex">滷肉飯・水餃</div></div>
<div class="t t-2"><div class="lab">小資享受</div><div class="ex">牛肉麵・壽司</div></div>
<div class="t t-3"><div class="lab">今日放縱</div><div class="ex">火鍋・鹹酥雞</div></div>
<div class="t t-4"><div class="lab">苦行修練</div><div class="ex">泡麵・沙拉</div></div>
<div class="t t-5"><div class="lab">✦ 傳說 ✦</div><div class="ex">高級餐廳</div></div>
</body></html>
