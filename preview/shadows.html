<!doctype html>
<html lang="zh-TW"><head>
<meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;background:#f5f0e8;padding:30px 20px;font-family:var(--font-body);color:#2c2416;display:flex;gap:20px;flex-wrap:wrap}
.s{width:150px;height:90px;background:#faf7f0;border:1px solid #e8dfcf;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;letter-spacing:1px;color:#6b5d4d;text-align:center;padding:10px}
.card{box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.hover{box-shadow:0 12px 40px rgba(0,0,0,0.18)}
.tarot{background:#1a1612;color:#c4a44e;border:2px solid #c4a44e;box-shadow:0 16px 36px rgba(0,0,0,0.5)}
.legend{background:#1a1612;color:#ffd700;border:3px solid #ffd700;box-shadow:0 8px 32px rgba(0,0,0,0.4),0 0 40px rgba(255,215,0,0.3)}
</style></head>
<body>
<div class="s card">card<br><span style="color:#a89880;font-size:10px">0 2 8 / .06</span></div>
<div class="s hover">card-hover<br><span style="color:#a89880;font-size:10px">0 12 40 / .18</span></div>
<div class="s tarot">tarot<br><span style="color:#6b5d4d;font-size:10px">深重陰影</span></div>
<div class="s legend">legend<br><span style="color:#b89030;font-size:10px">金光環繞</span></div>
</body></html>
