<!doctype html>
<html lang="zh-TW"><head>
<meta charset="utf-8"><title>Masters</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;background:#f5f0e8;padding:20px;font-family:'LXGW WenKai TC',serif;color:#2c2416;display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.m{background:#faf7f0;border:1px solid #e8dfcf;border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px}
.m .ico{font-size:34px;line-height:1}
.m .nm{font-family:'Ma Shan Zheng',cursive;font-size:16px;letter-spacing:2px;color:#2c2416}
.m .tr{font-size:10px;color:#a89880;letter-spacing:1px;margin-top:2px}
.m.devil{background:#2a1a1e;border-color:#8b3a3a}
.m.devil .nm{color:#e8c4c4}
.m.devil .tr{color:#8a6060}
</style></head>
<body>
<div class="m"><span class="ico">🍚</span><div><div class="nm">飽德大師</div><div class="tr">溫暖但毒舌</div></div></div>
<div class="m"><span class="ico">🔢</span><div><div class="nm">卡路里仙人</div><div class="tr">碎念熱量</div></div></div>
<div class="m"><span class="ico">🛵</span><div><div class="nm">外送天尊</div><div class="tr">抱怨外送</div></div></div>
<div class="m"><span class="ico">🍱</span><div><div class="nm">便當真人</div><div class="tr">省錢至上</div></div></div>
<div class="m"><span class="ico">👑</span><div><div class="nm">週五大帝</div><div class="tr">放縱派</div></div></div>
<div class="m devil"><span class="ico">👹</span><div><div class="nm">飢餓魔王</div><div class="tr">不准退貨</div></div></div>
</body></html>
