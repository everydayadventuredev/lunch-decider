<!doctype html>
<html lang="zh-TW"><head>
<meta charset="utf-8"><title>Type — Body</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;background:#f5f0e8;padding:22px 24px;font-family:'LXGW WenKai TC',serif;color:#2c2416}
.row{display:flex;align-items:baseline;gap:18px;border-bottom:1px dashed #d8cfbd;padding:8px 0}
.row:last-child{border-bottom:none}
.lbl{font-size:10px;color:#a89880;letter-spacing:1px;width:90px;flex-shrink:0}
.s-body{font-size:15px;line-height:1.8;font-style:italic;color:#2c2416;letter-spacing:1px}
.s-base{font-size:14px;line-height:1.6}
.s-label{font-size:12px;letter-spacing:2px;color:#b89030}
.s-meta{font-size:11px;letter-spacing:1px;color:#a89880}
</style></head>
<body>
<div class="row"><span class="lbl">Quote 15</span><span class="s-body">「吃飽才是正義，其他都是浮雲。」</span></div>
<div class="row"><span class="lbl">Body 14</span><span class="s-base">翻一張牌，讓午膳殿幫你決定今天中午吃什麼。</span></div>
<div class="row"><span class="lbl">Label 12</span><span class="s-label">幸運物 | 一杯溫開水</span></div>
<div class="row"><span class="lbl">Meta 11</span><span class="s-meta">乙巳年 · 週三 · 12:34</span></div>
</body></html>
