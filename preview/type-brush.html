<!doctype html>
<html lang="zh-TW"><head>
<meta charset="utf-8"><title>Type — Brush</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;background:#f5f0e8;padding:22px 24px;font-family:var(--font-body)}
.row{display:flex;align-items:baseline;gap:18px;border-bottom:1px dashed #d8cfbd;padding:10px 0}
.row:last-child{border-bottom:none}
.lbl{font-family:var(--font-body);font-size:10px;color:#a89880;letter-spacing:1px;width:90px;flex-shrink:0}
.spec{font-family:'Ma Shan Zheng',cursive;color:#2c2416}
.s1{font-size:44px;letter-spacing:6px;line-height:1}
.s2{font-size:28px;letter-spacing:4px}
.s3{font-size:20px;letter-spacing:3px}
.s4{font-size:14px;letter-spacing:2px;color:#6b5d4d}
</style></head>
<body>
<div class="row"><span class="lbl">Display 44</span><span class="spec s1">午膳殿</span></div>
<div class="row"><span class="lbl">Heading 28</span><span class="spec s2">滷肉飯</span></div>
<div class="row"><span class="lbl">Title 20</span><span class="spec s3">食曆統計</span></div>
<div class="row"><span class="lbl">Meta 14</span><span class="spec s4">乙巳年 三月初八</span></div>
</body></html>
