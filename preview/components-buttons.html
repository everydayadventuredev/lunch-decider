<!doctype html>
<html lang="zh-TW"><head>
<meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;background:#f5f0e8;padding:26px 20px;font-family:'LXGW WenKai TC',serif;display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.btn{font-family:'LXGW WenKai TC',serif;font-size:13px;padding:10px 22px;border-radius:8px;cursor:pointer;letter-spacing:2px;transition:all .2s;border:none}
.primary{background:linear-gradient(135deg,#c4a44e,#d4b44e);color:#1a1612;font-weight:700;box-shadow:0 4px 16px rgba(196,164,78,0.3)}
.secondary{background:transparent;color:#a89880;border:1.5px solid rgba(196,164,78,0.4)}
.parchment{background:#faf7f0;color:#6b5d4d;border:1px solid #a89880;padding:10px 14px;font-size:13px;min-height:44px;letter-spacing:2px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.devil{background:#8b3a3a;color:#e8c4c4;font-weight:700;padding:12px 38px;letter-spacing:4px;box-shadow:0 4px 16px rgba(139,58,58,0.4);border-radius:8px;font-size:14px;border:none;cursor:pointer;font-family:'LXGW WenKai TC',serif}
</style></head>
<body>
<button class="btn primary">認命了</button>
<button class="btn secondary">此指引不準，再來</button>
<button class="parchment">食曆 (12)</button>
<button class="devil">遵旨</button>
</body></html>
