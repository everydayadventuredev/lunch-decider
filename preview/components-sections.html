<!doctype html>
<html lang="zh-TW"><head>
<meta charset="utf-8"><title>Section Pills (Dark)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;background:#1a1612;padding:20px;font-family:'LXGW WenKai TC',serif;color:#e8dcc8;display:flex;flex-direction:column;gap:10px}
.sec{background:rgba(196,164,78,0.06);border:1px solid rgba(196,164,78,0.10);border-radius:8px;padding:10px 14px;position:relative}
.stamp{position:absolute;top:4px;right:8px;border:2px solid #c4a44e;border-radius:4px;padding:3px 6px;font-family:'Ma Shan Zheng',cursive;font-size:16px;color:#c4a44e;opacity:0.7;transform:rotate(-6deg);line-height:1}
.stamp.bad{border-color:#a89880;color:#a89880;opacity:0.6}
.item{font-size:13px;line-height:1.6;padding-right:36px}
.item .d{color:#6b5d4d;margin-right:6px}
.meta{display:flex;align-items:baseline;padding:5px 12px;border-radius:6px;background:rgba(196,164,78,0.06);border:1px solid rgba(196,164,78,0.10)}
.meta .k{color:#c4a44e;font-size:12px;letter-spacing:1px}
.meta .s{color:#6b5d4d;margin:0 6px}
.meta .v{color:#e8dcc8;font-size:13px}
</style></head>
<body>
<div class="sec"><span class="stamp">宜</span><div class="item"><span class="d">·</span>配青菜均衡一下</div><div class="item"><span class="d">·</span>吃完散步十分鐘</div></div>
<div class="sec"><span class="stamp bad">忌</span><div class="item"><span class="d">·</span>配珍奶不要再加</div></div>
<div class="meta"><span class="k">幸運物</span><span class="s">|</span><span class="v">一杯溫開水</span></div>
<div class="meta"><span class="k">幸運方位</span><span class="s">|</span><span class="v">靠窗的位置</span></div>
</body></html>
