<!doctype html>
<html lang="zh-TW"><head>
<meta charset="utf-8"><title>Ornaments</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;background:#1a1612;padding:20px;font-family:var(--font-body);color:#c4a44e;display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.cell{background:#221c16;border:1px solid rgba(196,164,78,0.15);border-radius:8px;padding:14px;display:flex;flex-direction:column;align-items:center;gap:6px;aspect-ratio:1}
.cell svg{width:60px;height:60px}
.lbl{font-family:'Ma Shan Zheng',cursive;font-size:13px;letter-spacing:3px;color:#a89880}
</style></head>
<body>
<div class="cell">
  <svg viewBox="0 0 32 32" fill="none"><path d="M4 28 Q4 16 10 10 Q16 4 28 4" stroke="#c4a44e" stroke-width="1" opacity=".7"/><path d="M8 18 Q6 15 9 14 Q12 13 10 16 Z" fill="#c4a44e" opacity=".4"/><path d="M16 10 Q14 7 17 7 Q20 7 17 9 Z" fill="#c4a44e" opacity=".4"/><circle cx="6" cy="22" r="1" fill="#c4a44e" opacity=".5"/></svg>
  <span class="lbl">庶民・小資</span>
</div>
<div class="cell">
  <svg viewBox="0 0 40 40" fill="none"><path d="M4 36 Q4 18 12 10 Q20 4 36 4" stroke="#e8943a" stroke-width="1.2" opacity=".7"/><path d="M6 32 Q6 16 14 10 Q22 6 32 4" stroke="#e8943a" stroke-width="0.8" opacity=".4"/><path d="M10 22 Q7 18 11 16 Q15 14 12 20 Z" fill="#e8943a" opacity=".5"/><path d="M20 12 Q17 8 21 8 Q25 8 21 11 Z" fill="#e8943a" opacity=".5"/></svg>
  <span class="lbl" style="color:#e8943a">放縱</span>
</div>
<div class="cell">
  <svg viewBox="0 0 20 20" fill="none"><path d="M2 18 L2 2 L18 2" stroke="#7a8088" stroke-width="0.8" opacity=".5"/></svg>
  <span class="lbl" style="color:#7a8088">苦行</span>
</div>
<div class="cell">
  <svg viewBox="0 0 52 52" fill="none"><path d="M4 48 Q4 20 14 12 Q24 4 48 4" stroke="#ffd700" stroke-width="1.5" opacity=".8"/><path d="M6 40 Q6 22 16 14 Q26 6 42 4" stroke="#ffd700" stroke-width="1" opacity=".5"/><path d="M10 30 Q6 24 12 20 Q18 16 14 26 Z" fill="#ffd700" opacity=".4"/><path d="M24 14 Q20 8 26 8 Q32 8 26 12 Z" fill="#ffd700" opacity=".45"/><circle cx="8" cy="36" r="1.5" fill="#ffd700" opacity=".6"/></svg>
  <span class="lbl" style="color:#ffd700">傳說</span>
</div>
</body></html>
