<!doctype html>
<html lang="zh-TW"><head>
<meta charset="utf-8"><title>Parchment Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;background:#f5f0e8;font-family:'LXGW WenKai TC',serif;display:flex;gap:14px;flex-wrap:wrap}
.card{background:#faf7f0;border:1px solid #a89880;border-radius:10px;padding:14px 16px;box-shadow:0 2px 8px rgba(0,0,0,0.06);width:220px}
.date{font-size:11px;color:#a89880;letter-spacing:1px;margin-bottom:6px}
.food{font-family:'Ma Shan Zheng',cursive;font-size:22px;color:#2c2416;letter-spacing:3px}
.meta{font-size:12px;color:#6b5d4d;margin-top:4px}
.quote{font-size:12px;color:#a89880;margin-top:6px;font-style:italic}
.pill{display:inline-block;margin-top:6px;font-size:11px;color:#c23a2e;letter-spacing:1px}
</style></head>
<body>
<div class="card">
  <div class="date">乙巳年 三月初八 · 週三 12:34</div>
  <div class="food">滷肉飯</div>
  <div class="meta">加班無底局 ・ 飽德大師</div>
  <div class="quote">「吃飽才是正義，其他都是浮雲。」</div>
</div>
<div class="card">
  <div class="date">乙巳年 三月初七 · 週二 12:18</div>
  <div class="food">火鍋</div>
  <div class="meta">週五無禁忌 ・ 週五大帝</div>
  <div class="quote">「今天是週五，熱量不存在。」</div>
  <div class="pill">重抽 2 次才認命</div>
</div>
</body></html>
