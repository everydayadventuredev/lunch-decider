<!doctype html>
<html lang="zh-TW"><head>
<meta charset="utf-8"><title>Colors — Tiers</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;background:#1a1612;padding:20px;font-family:var(--font-body);color:#e8dcc8}
.wrap{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.sw{border-radius:8px;overflow:hidden;background:#221c16;border:1px solid rgba(196,164,78,0.15)}
.chip{height:72px;display:flex;align-items:center;justify-content:center}
.gem{width:20px;height:20px}
.meta{padding:8px 10px;font-size:10px;letter-spacing:1px}
.name{font-family:var(--font-brush);letter-spacing:3px;font-size:14px;display:block;margin-bottom:2px}
.hex{color:#6b5d4d;font-variant-numeric:tabular-nums;font-size:9px}
</style></head>
<body>
<div class="wrap">
  <div class="sw"><div class="chip" style="background:rgba(196,164,78,0.12)"><svg class="gem" viewBox="0 0 20 20"><circle cx="10" cy="10" r="4" fill="#c4a44e"/></svg></div><div class="meta"><span class="name" style="color:#c4a44e">庶民</span><span class="hex">#c4a44e</span></div></div>
  <div class="sw"><div class="chip" style="background:rgba(212,180,78,0.14)"><svg class="gem" viewBox="0 0 20 20"><polygon points="10,2 18,10 10,18 2,10" fill="#d4b44e"/></svg></div><div class="meta"><span class="name" style="color:#d4b44e">小資</span><span class="hex">#d4b44e</span></div></div>
  <div class="sw"><div class="chip" style="background:rgba(232,148,58,0.16)"><svg class="gem" viewBox="0 0 20 20"><polygon points="10,1 19,10 10,19 1,10" fill="#e8943a"/></svg></div><div class="meta"><span class="name" style="color:#e8943a">放縱</span><span class="hex">#e8943a</span></div></div>
  <div class="sw" style="background:#16171a"><div class="chip" style="background:rgba(122,128,136,0.10)"><svg class="gem" viewBox="0 0 20 20"><circle cx="10" cy="10" r="3" fill="#7a8088"/></svg></div><div class="meta"><span class="name" style="color:#7a8088">苦行</span><span class="hex">#7a8088</span></div></div>
  <div class="sw"><div class="chip" style="background:rgba(255,215,0,0.12)"><svg class="gem" viewBox="0 0 22 22"><polygon points="11,1 13,8 20,8 14,12 16,19 11,15 6,19 8,12 2,8 9,8" fill="#ffd700"/></svg></div><div class="meta"><span class="name" style="color:#ffd700">傳說</span><span class="hex">#ffd700</span></div></div>
</div></body></html>
